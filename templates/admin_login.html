{% extends "base.html" %}
{% block content %}
<section class="card shadow-sm mx-auto" style="max-width: 520px;">
  <div class="card-body p-4">
    <h1 class="h2 mb-3">{{ t('admin_title') }}</h1>
    <p class="text-body-secondary">{{ t('admin_help') }}</p>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="post" action="/admin/login" class="d-grid gap-3">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="next" value="{{ next|default('') }}">
      <label>
        {{ t('admin_token_label') }}
        <input class="form-control mt-1" type="password" name="admin_token" autocomplete="current-password" required autofocus>
      </label>
      <button class="btn btn-maat-submit" type="submit">{{ t('admin_title') }}</button>
    </form>
  </div>
</section>
{% endblock %}

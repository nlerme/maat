{% extends "base.html" %}
{% block content %}
<section class="card shadow-sm">
  <div class="card-body p-4">
    <div class="d-flex flex-column flex-md-row justify-content-between gap-2 mb-3">
      <div>
        <h1 class="h3 mb-1">{{ stream }} · {{ instance_key }}</h1>
        <p class="text-body-secondary mb-0">{{ t('submission_id') }} {{ submission_id }}</p>
      </div>
      <div class="d-flex flex-wrap gap-2 align-self-start">
        <button class="btn btn-outline-secondary" type="button" data-copy-target="output-text">{{ t('copy') }}</button>
        <a class="btn btn-outline-primary" href="/submission/{{ submission_id }}{{ owner_param|default('') }}">{{ t('output_back') }}</a>
      </div>
    </div>
    {% if truncated %}<div class="alert alert-warning">{{ t('output_truncated') }}</div>{% endif %}
    <pre id="output-text" class="output mb-0">{{ text }}</pre>
  </div>
</section>
{% endblock %}
